<svg xmlns="http://www.w3.org/2000/svg" width="680" height="580">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Developer -->
  <rect x="240" y="20" width="200" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="340" y="43" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9" font-family="Inter,sans-serif">Developer</text>
  <text x="340" y="61" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="Inter,sans-serif">Opens or updates a pull request</text>

  <line x1="340" y1="72" x2="340" y2="100" stroke="#64748b" stroke-width="1" marker-end="url(#ar)"/>
  <text x="350" y="89" font-size="10" fill="#475569" font-family="Inter,sans-serif">webhook</text>

  <!-- GitHub PR -->
  <rect x="240" y="100" width="200" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="340" y="123" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9" font-family="Inter,sans-serif">GitHub pull request</text>
  <text x="340" y="141" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="Inter,sans-serif">Fires on open / push</text>

  <line x1="340" y1="152" x2="340" y2="180" stroke="#64748b" stroke-width="1" marker-end="url(#ar)"/>

  <!-- CyBox dashed container -->
  <rect x="40" y="180" width="600" height="200" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="62" y="199" font-size="10" fill="#3b82f6" font-weight="700" font-family="Inter,sans-serif">CYBOX SCAN</text>

  <!-- Scanner boxes -->
  <rect x="58" y="208" width="128" height="50" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="122" y="229" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd" font-family="Inter,sans-serif">SAST</text>
  <text x="122" y="247" text-anchor="middle" font-size="10" fill="#60a5fa" font-family="Inter,sans-serif">Code vulnerabilities</text>

  <rect x="204" y="208" width="128" height="50" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="268" y="229" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd" font-family="Inter,sans-serif">Secrets</text>
  <text x="268" y="247" text-anchor="middle" font-size="10" fill="#60a5fa" font-family="Inter,sans-serif">Keys &amp; tokens</text>

  <rect x="350" y="208" width="128" height="50" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="414" y="229" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd" font-family="Inter,sans-serif">SCA</text>
  <text x="414" y="247" text-anchor="middle" font-size="10" fill="#60a5fa" font-family="Inter,sans-serif">Dependency CVEs</text>

  <rect x="496" y="208" width="126" height="50" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="559" y="229" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd" font-family="Inter,sans-serif">AI detection</text>
  <text x="559" y="247" text-anchor="middle" font-size="10" fill="#60a5fa" font-family="Inter,sans-serif">Copilot, Cursor…</text>

  <line x1="340" y1="258" x2="340" y2="290" stroke="#64748b" stroke-width="1" marker-end="url(#ar)"/>

  <!-- Rules engine -->
  <rect x="180" y="290" width="320" height="60" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="340" y="314" text-anchor="middle" font-size="13" font-weight="600" fill="#93c5fd" font-family="Inter,sans-serif">Rules engine</text>
  <text x="340" y="333" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="Inter,sans-serif">Top-to-bottom &#183; First match wins</text>

  <line x1="340" y1="380" x2="340" y2="410" stroke="#64748b" stroke-width="1" marker-end="url(#ar)"/>
  <text x="352" y="398" font-size="10" fill="#475569" font-family="Inter,sans-serif">verdict</text>

  <!-- Verdict boxes -->
  <rect x="60" y="410" width="160" height="56" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="433" text-anchor="middle" font-size="13" font-weight="700" fill="#4ade80" font-family="Inter,sans-serif">&#10003;  Allow</text>
  <text x="140" y="452" text-anchor="middle" font-size="11" fill="#86efac" font-family="Inter,sans-serif">Check passes</text>

  <rect x="260" y="410" width="160" height="56" rx="8" fill="#1c1003" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="433" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24" font-family="Inter,sans-serif">&#9651;  Warn</text>
  <text x="340" y="452" text-anchor="middle" font-size="11" fill="#fcd34d" font-family="Inter,sans-serif">Flagged, can merge</text>

  <rect x="460" y="410" width="160" height="56" rx="8" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="540" y="433" text-anchor="middle" font-size="13" font-weight="700" fill="#f87171" font-family="Inter,sans-serif">&#10007;  Block</text>
  <text x="540" y="452" text-anchor="middle" font-size="11" fill="#fca5a5" font-family="Inter,sans-serif">Merge prevented</text>

  <!-- Fan arrows -->
  <line x1="140" y1="466" x2="235" y2="514" stroke="#22c55e" stroke-width="1" marker-end="url(#ar-g)"/>
  <line x1="340" y1="466" x2="305" y2="514" stroke="#22c55e" stroke-width="1" marker-end="url(#ar-g)"/>
  <line x1="540" y1="466" x2="540" y2="514" stroke="#ef4444" stroke-width="1" marker-end="url(#ar-r)"/>

  <!-- Outcome boxes -->
  <rect x="140" y="514" width="260" height="48" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="270" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#4ade80" font-family="Inter,sans-serif">main branch &#8594; Production</text>
  <text x="270" y="552" text-anchor="middle" font-size="11" fill="#86efac" font-family="Inter,sans-serif">Code ships</text>

  <rect x="430" y="514" width="200" height="48" rx="8" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="530" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#f87171" font-family="Inter,sans-serif">Blocked</text>
  <text x="530" y="552" text-anchor="middle" font-size="11" fill="#fca5a5" font-family="Inter,sans-serif">Fix findings, re-push</text>
</svg>